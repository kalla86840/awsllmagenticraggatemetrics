version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    APP_DIR: .
    PROJECT_NAME: hospital-agentic-rag
    ARTIFACT_BUCKET: mlopswithsagemaker111
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    RAG_GATE_MIN_SCORE: "0.25"
    RAG_METRICS_NAMESPACE: hospital-agentic-rag/RAG
    RAG_METRICS_PATH: dist/rag-metrics.json

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
      - python -m pip install -r "${APP_DIR}/requirements.txt" -r "${APP_DIR}/requirements-dev.txt"
  build:
    commands:
      - cd "${APP_DIR}"
      - mkdir -p dist
      - python -m pytest tests
      - python scripts/evaluate_rag.py --min-score "${RAG_GATE_MIN_SCORE}" --output "${RAG_METRICS_PATH}"
      - aws s3 cp "${RAG_METRICS_PATH}" "s3://${ARTIFACT_BUCKET}/${PROJECT_NAME}/metrics/rag-metrics-${CODEBUILD_BUILD_NUMBER}.json"
      - aws s3 cp "${RAG_METRICS_PATH}" "s3://${ARTIFACT_BUCKET}/${PROJECT_NAME}/metrics/latest-rag-metrics.json"
      - |
        python -c "import json,os,subprocess; m=json.load(open(os.environ['RAG_METRICS_PATH'])); ns=os.environ['RAG_METRICS_NAMESPACE']; dims=[{'Name':'ProjectName','Value':os.environ['PROJECT_NAME']}]; data=[{'MetricName': k, 'Value': float(v), 'Unit': 'None', 'Dimensions': dims} for k,v in m['metrics'].items()]; subprocess.check_call(['aws','cloudwatch','put-metric-data','--namespace',ns,'--metric-data',json.dumps(data)])"
      - rm -rf build
      - mkdir -p build
      - python -m pip install -r requirements.txt -t build
      - cp src/app.py src/agent_profiles.yaml src/hospital_operations_manual.txt build/
      - cd build && zip -r ../dist/hospital-agentic-rag.zip . && cd ..
      - aws s3 cp dist/hospital-agentic-rag.zip "s3://${ARTIFACT_BUCKET}/${PROJECT_NAME}/lambda/hospital-agentic-rag.zip"
      - aws cloudformation deploy --template-file infrastructure/lambda.yaml --stack-name "${PROJECT_NAME}-endpoint" --capabilities CAPABILITY_NAMED_IAM --parameter-overrides ProjectName="${PROJECT_NAME}" ArtifactBucketName="${ARTIFACT_BUCKET}" LambdaS3Key="${PROJECT_NAME}/lambda/hospital-agentic-rag.zip" OpenAIApiKeySecretArn="${OPENAI_API_KEY_SECRET_ARN}" OpenAIModel="${OPENAI_MODEL}"

artifacts:
  base-directory: .
  files:
    - dist/hospital-agentic-rag.zip
    - dist/rag-metrics.json
