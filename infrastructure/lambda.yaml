AWSTemplateFormatVersion: "2010-09-09"
Description: OpenAI agentic hospital RAG Lambda endpoint.

Parameters:
  ProjectName:
    Type: String
    Default: hospital-agentic-rag
  ArtifactBucketName:
    Type: String
    Default: mlopswithsagemaker111
    Description: Existing S3 bucket containing the packaged Lambda artifact.
  LambdaS3Key:
    Type: String
    Default: hospital-agentic-rag/lambda/hospital-agentic-rag.zip
    Description: S3 key for the Lambda deployment package.
  OpenAIApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    Description: Secrets Manager ARN containing the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-5.2

Resources:
  HospitalAgenticRagRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAIApiKeySecretArn

  HospitalAgenticRagFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-endpoint
      Role: !GetAtt HospitalAgenticRagRole.Arn
      Runtime: python3.12
      Handler: app.lambda_handler
      Timeout: 90
      MemorySize: 512
      Code:
        S3Bucket: !Ref ArtifactBucketName
        S3Key: !Ref LambdaS3Key
      Environment:
        Variables:
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAIApiKeySecretArn
          OPENAI_MODEL: !Ref OpenAIModel
          MAX_OUTPUT_TOKENS: "1200"
          RAG_TOP_K: "4"

  HospitalAgenticRagUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref HospitalAgenticRagFunction
      AuthType: AWS_IAM
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
        AllowHeaders:
          - content-type
          - authorization
          - x-amz-date
          - x-amz-security-token

  HospitalAgenticRagUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HospitalAgenticRagFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: AWS_IAM

Outputs:
  FunctionName:
    Value: !Ref HospitalAgenticRagFunction
  FunctionUrl:
    Value: !GetAtt HospitalAgenticRagUrl.FunctionUrl
